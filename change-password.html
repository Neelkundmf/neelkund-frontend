<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0F2942">
    <title>NEELKUND — পাসওয়ার্ড বদলান</title>

    <link rel="icon" href="assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Hind+Siliguri:wght@400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/nk.css">

    <style>
        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;

            background:
                    radial-gradient(900px 500px at 12% -10%, #1B3B5C 0%, transparent 55%),
                    linear-gradient(165deg, #0F2942 0%, #0A1B2E 100%);
        }

        .wrap { width: 100%; max-width: 400px; }

        .top { text-align: center; margin-bottom: 24px; color: #fff; }
        .top .ico { font-size: 40px; margin-bottom: 10px; }
        .top h1 { font-family: 'Fraunces', serif; font-size: 22px; margin-bottom: 6px; }
        .top p { margin: 0; font-size: 13.5px; color: rgba(255,255,255,.62); }

        .box {
            background: #fff;
            border-radius: 20px;
            padding: 26px 22px;
            box-shadow: 0 24px 60px rgba(0,0,0,.3);
        }

        .who {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: var(--paper);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .who .av {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            background: var(--navy); color: #fff;
            border-radius: 10px;
            font-weight: 700; font-size: 16px;
        }
        .who b { display: block; font-size: 14.5px; }
        .who span { font-size: 12.5px; color: var(--muted); }

        .pw { position: relative; }
        .pw input { padding-right: 52px; }
        .eye {
            position: absolute; right: 6px; bottom: 4px;
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            background: none; border: 0; border-radius: 8px;
            font-size: 17px; color: var(--muted); cursor: pointer;
        }

        /* পাসওয়ার্ডের জোর */
        .bar {
            height: 5px;
            background: #EEF2F6;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        .bar i {
            display: block;
            height: 100%;
            width: 0;
            border-radius: 4px;
            transition: width .25s, background .25s;
        }
        .lvl { font-size: 12px; margin-top: 5px; color: var(--muted); }

        .rules { margin: 4px 0 20px; }
        .rules div {
            font-size: 12.5px;
            color: var(--muted);
            padding: 2px 0;
        }
        .rules div.ok { color: var(--green); }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="wrap">

    <div class="top">
        <div class="ico">🔐</div>
        <h1>পাসওয়ার্ড বদলান</h1>
        <p>প্রথমবার ঢুকছেন — নিজের পাসওয়ার্ড বসান</p>
    </div>

    <div class="box">

        <div class="who" id="who" style="display:none;">
            <div class="av" id="av">?</div>
            <div>
                <b id="nm">—</b>
                <span id="rl">—</span>
            </div>
        </div>

        <div class="msg" id="err"></div>

        <form id="f" novalidate>

            <div class="fld pw">
                <label for="old">এখনকার পাসওয়ার্ড</label>
                <input id="old" type="password" autocomplete="current-password" required>
                <button type="button" class="eye" data-for="old">👁</button>
            </div>

            <div class="fld pw">
                <label for="np">নতুন পাসওয়ার্ড</label>
                <input id="np" type="password" autocomplete="new-password" required>
                <button type="button" class="eye" data-for="np">👁</button>

                <div class="bar"><i id="bar"></i></div>
                <div class="lvl" id="lvl">কমপক্ষে ৮ অক্ষর</div>
            </div>

            <div class="rules">
                <div id="r1">○ ৮ অক্ষর বা তার বেশি</div>
                <div id="r2">○ একটা বড় হাতের অক্ষর</div>
                <div id="r3">○ একটা সংখ্যা</div>
            </div>

            <div class="fld pw">
                <label for="np2">নতুন পাসওয়ার্ড আবার</label>
                <input id="np2" type="password" autocomplete="new-password" required>
                <button type="button" class="eye" data-for="np2">👁</button>
            </div>

            <button type="submit" class="btn block" id="go">পাসওয়ার্ড বদলান</button>
        </form>

    </div>
</div>

<script src="assets/js/nk.js"></script>
<script>
    (function () {
        "use strict";

        var q = function (id) { return document.getElementById(id); };

        function toast(m, kind) {
            var t = document.createElement("div");
            t.className = "tst " + (kind || "in");
            t.textContent = m;
            q("toast").appendChild(t);
            setTimeout(function () { if (t.parentNode) t.parentNode.removeChild(t); }, 3600);
        }

        function showErr(m) { var e = q("err"); e.textContent = m; e.className = "msg er"; }
        function hideErr()  { q("err").className = "msg"; }

        /* ---- চোখ ---- */
        Array.prototype.forEach.call(document.querySelectorAll(".eye"), function (b) {
            b.addEventListener("click", function () {
                var inp = q(b.getAttribute("data-for"));
                var show = inp.type === "password";
                inp.type = show ? "text" : "password";
                b.textContent = show ? "🙈" : "👁";
            });
        });

        /* ---- পাসওয়ার্ডের জোর ---- */
        var ROLE_BN = {
            ADMIN: "অ্যাডমিন", PARTNER: "পার্টনার",
            MANAGER: "ম্যানেজার", AGENT: "এজেন্ট"
        };

        function check(p) {
            return {
                len: p.length >= 8,
                up:  /[A-Z]/.test(p),
                num: /[0-9]/.test(p)
            };
        }

        q("np").addEventListener("input", function () {
            var p = this.value;
            var c = check(p);

            q("r1").className = c.len ? "ok" : "";
            q("r2").className = c.up  ? "ok" : "";
            q("r3").className = c.num ? "ok" : "";

            q("r1").textContent = (c.len ? "✓" : "○") + " ৮ অক্ষর বা তার বেশি";
            q("r2").textContent = (c.up  ? "✓" : "○") + " একটা বড় হাতের অক্ষর";
            q("r3").textContent = (c.num ? "✓" : "○") + " একটা সংখ্যা";

            var score = (c.len ? 1 : 0) + (c.up ? 1 : 0) + (c.num ? 1 : 0);
            if (p.length >= 12) score++;

            var w = ["0%", "30%", "55%", "80%", "100%"][score];
            var col = ["#EEF2F6", "#E12A1F", "#D97706", "#16A34A", "#16A34A"][score];
            var txt = ["কমপক্ষে ৮ অক্ষর", "দুর্বল", "মোটামুটি", "ভালো", "খুব ভালো"][score];

            q("bar").style.width = w;
            q("bar").style.background = col;
            q("lvl").textContent = txt;
        });

        /* ---- কে ঢুকেছে ---- */
        NK.boot().then(function (r) {
            if (!r.ok || !r.me) {
                window.location.replace("login.html");
                return;
            }

            var u = r.me;
            q("who").style.display = "flex";
            q("av").textContent = (u.fullName || "?").charAt(0).toUpperCase();
            q("nm").textContent = u.fullName || "—";
            q("rl").textContent = ROLE_BN[u.role] || u.role;
        });

        /* ---- বদলানো ---- */
        q("f").addEventListener("submit", function (e) {
            e.preventDefault();
            hideErr();

            var oldP = q("old").value;
            var np   = q("np").value;
            var np2  = q("np2").value;

            if (!oldP) { showErr("এখনকার পাসওয়ার্ড দিন"); return; }

            var c = check(np);
            if (!c.len) { showErr("নতুন পাসওয়ার্ড কমপক্ষে ৮ অক্ষরের হতে হবে"); return; }

            if (np !== np2) {
                showErr("দুটো নতুন পাসওয়ার্ড মিলছে না");
                q("np2").focus();
                return;
            }

            if (np === oldP) {
                showErr("নতুন পাসওয়ার্ড পুরনোটার মতো হলে চলবে না");
                return;
            }

            var btn = q("go");
            btn.disabled = true;
            btn.innerHTML = '<span class="spin"></span> বদলাচ্ছি...';

            NK.POST("/api/auth/change-password", {
                currentPassword: oldP,
                newPassword: np
            })
                .then(function () {
                    toast("পাসওয়ার্ড বদলে গেছে ✓", "ok");

                    var u = NK.me();
                    setTimeout(function () {
                        window.location.replace(NK.homeFor(u ? u.role : "AGENT"));
                    }, 700);
                })
                .catch(function (err) {
                    showErr(err.message);
                    toast(err.message, "er");
                    btn.disabled = false;
                    btn.textContent = "পাসওয়ার্ড বদলান";
                });
        });

    })();
</script>
</body>
</html>
