<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0F2942">
  <title>NEELKUND — লগইন</title>

  <link rel="icon" href="assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Hind+Siliguri:wght@400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/nk.css">

  <style>
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      position: relative;
      overflow: hidden;

      background:
              radial-gradient(800px 480px at 10% -8%, #1F6F5C 0%, transparent 52%),
              radial-gradient(760px 520px at 108% 108%, #14B8A6 0%, transparent 46%),
              radial-gradient(700px 460px at 90% -5%, #1B3B5C 0%, transparent 50%),
              linear-gradient(160deg, #0F2942 0%, #0A1B2E 60%, #08243A 100%);
    }

    /* পেছনে হালকা glow বল — ধীরে ভাসবে */
    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: .35;
      z-index: 0;
      pointer-events: none;
    }
    body::before {
      width: 340px; height: 340px;
      background: #16C79A;
      top: -80px; left: -60px;
      animation: float1 11s ease-in-out infinite;
    }
    body::after {
      width: 300px; height: 300px;
      background: #2E7CF6;
      bottom: -90px; right: -50px;
      animation: float2 13s ease-in-out infinite;
    }
    @keyframes float1 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(40px,30px) scale(1.12); }
    }
    @keyframes float2 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(-36px,-28px) scale(1.15); }
    }

    /* পেছনে বড় লোগো — live নিঃশ্বাসের মতো */
    .bglogo {
      position: absolute;
      top: 50%; left: 50%;
      width: 460px; height: 460px;
      transform: translate(-50%, -50%);
      z-index: 0;
      opacity: .06;
      pointer-events: none;
      animation: breathe 7s ease-in-out infinite;
    }
    .bglogo img { width: 100%; height: 100%; object-fit: contain; }
    @keyframes breathe {
      0%,100% { transform: translate(-50%,-50%) scale(1);    opacity: .05; }
      50%     { transform: translate(-50%,-50%) scale(1.14); opacity: .10; }
    }

    .wrap { width: 100%; max-width: 400px; position: relative; z-index: 2; }

    /* ---- লোগো ---- */
    .top {
      text-align: center;
      margin-bottom: 26px;
      color: #fff;
    }
    .mark {
      width: 78px;
      height: 78px;
      margin: 0 auto 16px;

      display: flex;
      align-items: center;
      justify-content: center;

      background: linear-gradient(145deg, rgba(22,199,154,.22), rgba(46,124,246,.18));
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 22px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(20,184,166,.25);
      animation: markpulse 4s ease-in-out infinite;
    }
    @keyframes markpulse {
      0%,100% { box-shadow: 0 10px 30px rgba(20,184,166,.25); }
      50%     { box-shadow: 0 12px 40px rgba(46,124,246,.40); }
    }
    .mark img { width: 46px; height: 46px; object-fit: contain; }

    .top h1 {
      font-family: 'Fraunces', serif;
      font-size: 29px;
      letter-spacing: .06em;
      margin-bottom: 5px;
      background: linear-gradient(90deg, #EAFBF4, #BFE9FF);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .top p {
      margin: 0;
      font-size: 13.5px;
      color: rgba(255,255,255,.7);
      letter-spacing: .02em;
    }

    /* ---- বাক্স ---- */
    .box {
      background: rgba(255,255,255,.98);
      border-radius: 22px;
      padding: 26px 22px;
      box-shadow: 0 24px 70px rgba(0,0,0,.38);
      border: 1px solid rgba(255,255,255,.5);
    }

    .box h2 {
      font-size: 18px;
      margin-bottom: 4px;
    }
    .box .sub {
      font-size: 13.5px;
      color: var(--muted);
      margin: 0 0 22px;
    }

    /* ---- পাসওয়ার্ড দেখা ---- */
    .pw { position: relative; }
    .pw input { padding-right: 52px; }
    .eye {
      position: absolute;
      right: 6px;
      bottom: 4px;

      width: 42px;
      height: 42px;

      display: flex;
      align-items: center;
      justify-content: center;

      background: none;
      border: 0;
      border-radius: 8px;

      font-size: 17px;
      color: var(--muted);
      cursor: pointer;
    }
    .eye:active { background: #F1F5F9; }

    /* ---- নিচের লাইন ---- */
    .foot {
      text-align: center;
      margin-top: 18px;
    }
    .foot a {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--muted);
    }

    .copy {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,.5);
      position: relative;
      z-index: 2;
    }

    /* ---- সংযোগ নেই ---- */
    #offline {
      display: none;
      margin-bottom: 14px;
      padding: 11px 14px;
      border-radius: 10px;
      background: var(--amber-soft);
      color: var(--amber);
      font-size: 13.5px;
      text-align: center;
    }
    #offline.on { display: block; }
  </style>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/logo.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NEELKUND">
  <meta name="mobile-web-app-capable" content="yes">
</head>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("/sw.js").catch(function () {});
    });
  }
</script>
<body>

<div class="bglogo"><img src="assets/logo.png" alt=""></div>

<div id="toast"></div>

<div class="wrap">

  <div class="top">
    <div class="mark"><img src="assets/logo.png" alt="NEELKUND"></div>
    <h1>NEELKUND</h1>
    <p>মাইক্রোফাইন্যান্স</p>
  </div>

  <div class="box">
    <h2>স্বাগতম</h2>
    <p class="sub">ফোন নম্বর আর পাসওয়ার্ড দিয়ে ঢুকুন</p>

    <div id="offline">📡 ইন্টারনেট নেই — সংযোগ দেখে নিন</div>

    <div class="msg" id="err"></div>

    <form id="f" novalidate>
      <div class="fld">
        <label for="phone">ফোন নম্বর</label>
        <input id="phone"
               type="tel"
               inputmode="numeric"
               autocomplete="username"
               maxlength="10"
               placeholder="১০ সংখ্যার নম্বর"
               required>
      </div>

      <div class="fld pw">
        <label for="pass">পাসওয়ার্ড</label>
        <input id="pass"
               type="password"
               autocomplete="current-password"
               placeholder="পাসওয়ার্ড"
               required>
        <button type="button" class="eye" id="eye" aria-label="পাসওয়ার্ড দেখুন">👁</button>
      </div>

      <button type="submit" class="btn block" id="go">লগইন করুন</button>
    </form>

    <div class="foot">
      <a href="forgot-password.html">পাসওয়ার্ড ভুলে গেছেন?</a>
    </div>
  </div>

  <div class="copy">© NEELKUND Microfinance</div>

</div>

<script src="assets/js/nk.js"></script>
<script>
  (function () {
    "use strict";

    var q = function (id) { return document.getElementById(id); };

    /* ---- টোস্ট ---- */
    function toast(m, kind) {
      var box = q("toast");
      var t = document.createElement("div");
      t.className = "tst " + (kind || "in");
      t.textContent = m;
      box.appendChild(t);
      setTimeout(function () {
        if (t.parentNode) t.parentNode.removeChild(t);
      }, 3600);
    }

    function showErr(m) {
      var e = q("err");
      e.textContent = m;
      e.className = "msg er";
    }
    function hideErr() {
      q("err").className = "msg";
    }

    /* ---- ইন্টারনেট আছে কিনা ---- */
    function net() {
      q("offline").className = navigator.onLine ? "" : "on";
      q("go").disabled = !navigator.onLine;
    }
    window.addEventListener("online", net);
    window.addEventListener("offline", net);
    net();

    /* ---- পাসওয়ার্ড দেখা ---- */
    q("eye").addEventListener("click", function () {
      var p = q("pass");
      var show = p.type === "password";
      p.type = show ? "text" : "password";
      this.textContent = show ? "🙈" : "👁";
    });

    /* ---- শুধু সংখ্যা ---- */
    q("phone").addEventListener("input", function () {
      this.value = this.value.replace(/[^0-9]/g, "").slice(0, 10);
    });

    /* ---- পরের পাতায় পাঠাই ---- */
    function goHome(user) {
      if (user.mustChangePassword) {
        window.location.replace("change-password.html");
        return;
      }
      window.location.replace(NK.homeFor(user.role));
    }

    /* ---- আগে থেকেই লগইন করা আছে? ---- */
    NK.boot().then(function (r) {
      if (r.ok && r.me) goHome(r.me);
    });

    /* ---- লগইন ---- */
    q("f").addEventListener("submit", function (e) {
      e.preventDefault();
      hideErr();

      var phone = q("phone").value.trim();
      var pass  = q("pass").value;

      if (!/^[6-9][0-9]{9}$/.test(phone)) {
        showErr("সঠিক ১০ সংখ্যার ফোন নম্বর দিন");
        q("phone").focus();
        return;
      }
      if (!pass) {
        showErr("পাসওয়ার্ড দিন");
        q("pass").focus();
        return;
      }

      var btn = q("go");
      btn.disabled = true;
      btn.innerHTML = '<span class="spin"></span> ঢুকছি...';

      NK.login(phone, pass)
              .then(function (d) {
                toast("স্বাগতম, " + d.fullName, "ok");
                setTimeout(function () { goHome(d); }, 350);
              })
              .catch(function (err) {
                showErr(err.message);
                toast(err.message, "er");

                btn.disabled = false;
                btn.textContent = "লগইন করুন";

                q("pass").value = "";
                q("pass").focus();
              });
    });

  })();
</script>
</body>
</html>
