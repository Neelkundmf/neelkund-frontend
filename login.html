<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#060D19">
  <title>NEELKUND — লগইন</title>

  <link rel="icon" href="assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Hind+Siliguri:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/nk.css">

  <style>
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      position: relative;
      overflow: hidden;

      background: radial-gradient(ellipse 700px 500px at 50% 22%, #123055 0%, #081527 45%, #04070d 85%);
    }

    .wrap { width: 100%; max-width: 400px; position: relative; z-index: 2; }

    /* ---- লোগো + জ্বলজ্বলে রিং ---- */
    .top {
      text-align: center;
      margin-bottom: 22px;
      color: #fff;
    }
    .mark {
      width: 150px;
      height: 150px;
      margin: 0 auto 18px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mark::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2.5px solid transparent;
      border-top-color: rgba(255,60,60,.95);
      border-right-color: rgba(255,120,120,.55);
      border-bottom-color: rgba(255,25,25,.2);
      box-shadow: 0 0 18px 4px rgba(255,25,25,.4);
      animation: spin 3s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .mark img {
      width: 108px;
      height: 108px;
      object-fit: contain;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 0 12px rgba(255,35,35,.5));
    }

    .top h1 {
      font-family: 'Manrope', sans-serif;
      font-size: 25px;
      font-weight: 800;
      letter-spacing: .08em;
      color: #fff;
      text-shadow: 0 0 20px rgba(255,255,255,.22);
      margin-bottom: 4px;
    }
    .top p {
      margin: 0;
      font-size: 13px;
      color: rgba(255,255,255,.55);
      letter-spacing: .02em;
    }

    /* ---- ফর্ম (আর সাদা বাক্স না, সরাসরি অন্ধকার পটভূমিতে) ---- */
    .box { padding: 0; }

    .box h2 {
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      color: rgba(255,255,255,.92);
      margin: 0 0 3px;
    }
    .box .sub {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,.5);
      margin: 0 0 22px;
    }

    .fld label {
      color: rgba(255,255,255,.6);
      font-size: 12.5px;
    }
    .fld input {
      background: rgba(255,255,255,.05);
      border: 1.5px solid rgba(255,255,255,.22);
      color: #fff;
      border-radius: 14px;
      transition: box-shadow .2s, border-color .2s, background .2s;
    }
    .fld input::placeholder { color: rgba(255,255,255,.32); }
    .fld input:focus {
      border-color: rgba(255,70,70,.85);
      box-shadow: 0 0 0 3px rgba(255,35,35,.15), 0 0 18px rgba(255,35,35,.35);
      background: rgba(255,255,255,.07);
      outline: none;
    }

    /* ---- পাসওয়ার্ড দেখা ---- */
    .pw { position: relative; }
    .pw input { padding-right: 52px; }
    .eye {
      position: absolute;
      right: 6px;
      bottom: 4px;

      width: 42px;
      height: 42px;

      display: flex;
      align-items: center;
      justify-content: center;

      background: none;
      border: 0;
      border-radius: 8px;

      font-size: 17px;
      color: rgba(255,255,255,.55);
      cursor: pointer;
    }
    .eye:active { background: rgba(255,255,255,.08); }

    /* ---- বোতাম — লাল গ্লো ---- */
    #go {
      background: linear-gradient(135deg, #FF2A2A, #C4001A);
      border: none;
      color: #fff;
      font-weight: 800;
      letter-spacing: .03em;
      border-radius: 999px;
      box-shadow: 0 0 22px rgba(255,20,20,.5), 0 10px 26px rgba(255,20,20,.28);
    }

    /* ---- নিচের লাইন ---- */
    .foot {
      text-align: center;
      margin-top: 18px;
    }
    .foot a {
      font-size: 13.5px;
      font-weight: 600;
      color: rgba(255,255,255,.65);
    }

    .copy {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,.4);
      position: relative;
      z-index: 2;
    }

    /* ---- সংযোগ নেই ---- */
    #offline {
      display: none;
      margin-bottom: 14px;
      padding: 11px 14px;
      border-radius: 10px;
      background: var(--amber-soft);
      color: var(--amber);
      font-size: 13.5px;
      text-align: center;
    }
    #offline.on { display: block; }
  </style>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/logo.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NEELKUND">
  <meta name="mobile-web-app-capable" content="yes">
</head>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("/sw.js").catch(function () {});
    });
  }
</script>
<body>

<div id="toast"></div>

<div class="wrap">

  <div class="top">
    <div class="mark"><img src="assets/logo.png" alt="NEELKUND"></div>
    <h1>NEELKUND</h1>
    <p>মাইক্রোফাইন্যান্স</p>
  </div>

  <div class="box">
    <h2>স্বাগতম</h2>
    <p class="sub">ফোন নম্বর আর পাসওয়ার্ড দিয়ে ঢুকুন</p>

    <div id="offline">📡 ইন্টারনেট নেই — সংযোগ দেখে নিন</div>

    <div class="msg" id="err"></div>

    <form id="f" novalidate>
      <div class="fld">
        <label for="phone">ফোন নম্বর</label>
        <input id="phone"
               type="tel"
               inputmode="numeric"
               autocomplete="username"
               maxlength="10"
               placeholder="১০ সংখ্যার নম্বর"
               required>
      </div>

      <div class="fld pw">
        <label for="pass">পাসওয়ার্ড</label>
        <input id="pass"
               type="password"
               autocomplete="current-password"
               placeholder="পাসওয়ার্ড"
               required>
        <button type="button" class="eye" id="eye" aria-label="পাসওয়ার্ড দেখুন">👁</button>
      </div>

      <button type="submit" class="btn block" id="go">লগইন করুন</button>
    </form>

    <div class="foot">
      <a href="forgot-password.html">পাসওয়ার্ড ভুলে গেছেন?</a>
    </div>
  </div>

  <div class="copy">© NEELKUND Microfinance</div>

</div>

<script src="assets/js/nk.js"></script>
<script>
  (function () {
    "use strict";

    var q = function (id) { return document.getElementById(id); };

    /* ---- টোস্ট ---- */
    function toast(m, kind) {
      var box = q("toast");
      var t = document.createElement("div");
      t.className = "tst " + (kind || "in");
      t.textContent = m;
      box.appendChild(t);
      setTimeout(function () {
        if (t.parentNode) t.parentNode.removeChild(t);
      }, 3600);
    }

    function showErr(m) {
      var e = q("err");
      e.textContent = m;
      e.className = "msg er";
    }
    function hideErr() {
      q("err").className = "msg";
    }

    /* ---- ইন্টারনেট আছে কিনা ---- */
    function net() {
      q("offline").className = navigator.onLine ? "" : "on";
      q("go").disabled = !navigator.onLine;
    }
    window.addEventListener("online", net);
    window.addEventListener("offline", net);
    net();

    /* ---- পাসওয়ার্ড দেখা ---- */
    q("eye").addEventListener("click", function () {
      var p = q("pass");
      var show = p.type === "password";
      p.type = show ? "text" : "password";
      this.textContent = show ? "🙈" : "👁";
    });

    /* ---- শুধু সংখ্যা ---- */
    q("phone").addEventListener("input", function () {
      this.value = this.value.replace(/[^0-9]/g, "").slice(0, 10);
    });

    /* ---- পরের পাতায় পাঠাই ---- */
    function goHome(user) {
      if (user.mustChangePassword) {
        window.location.replace("change-password.html");
        return;
      }
      window.location.replace(NK.homeFor(user.role));
    }

    /* ---- আগে থেকেই লগইন করা আছে? ---- */
    NK.boot().then(function (r) {
      if (r.ok && r.me) goHome(r.me);
    });

    /* ---- লগইন ---- */
    q("f").addEventListener("submit", function (e) {
      e.preventDefault();
      hideErr();

      var phone = q("phone").value.trim();
      var pass  = q("pass").value;

      if (!/^[6-9][0-9]{9}$/.test(phone)) {
        showErr("সঠিক ১০ সংখ্যার ফোন নম্বর দিন");
        q("phone").focus();
        return;
      }
      if (!pass) {
        showErr("পাসওয়ার্ড দিন");
        q("pass").focus();
        return;
      }

      var btn = q("go");
      btn.disabled = true;
      btn.innerHTML = '<span class="spin"></span> ঢুকছি...';

      NK.login(phone, pass)
              .then(function (d) {
                toast("স্বাগতম, " + d.fullName, "ok");
                setTimeout(function () { goHome(d); }, 350);
              })
              .catch(function (err) {
                showErr(err.message);
                toast(err.message, "er");

                btn.disabled = false;
                btn.textContent = "লগইন করুন";

                q("pass").value = "";
                q("pass").focus();
              });
    });

  })();
</script>
</body>
</html>
