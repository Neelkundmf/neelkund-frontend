<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEELKUND — পাসওয়ার্ড ভুলে গেছেন</title>
  <link rel="icon" href="assets/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #102A40 0%, #0A1C2B 100%);
      padding: 24px;
      font-family: 'Hind Siliguri', system-ui, sans-serif;
    }
    .card {
      background: #fff; border-radius: 16px;
      width: 100%; max-width: 420px;
      padding: 34px 30px 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,.30);
      text-align: center;
    }
    .card img { width: 62px; height: 62px; margin-bottom: 18px; }
    .card h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 26px; color: #102A40; margin: 0 0 8px;
    }
    .sub { font-size: 14.5px; line-height: 1.65; color: #5E6B78; margin: 0 0 24px; }
    .left { text-align: left; }
    label { display: block; font-size: 13px; font-weight: 600; color: #102A40; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 14px; font-size: 15px;
      border: 1px solid #D6DCE2; border-radius: 9px;
      font-family: inherit; outline: none;
    }
    input:focus { border-color: #102A40; box-shadow: 0 0 0 3px rgba(16,42,64,.10); }
    button {
      width: 100%; padding: 13px; font-size: 15px; margin-top: 16px;
      background: #102A40; color: #fff; border: 0; border-radius: 9px;
      font-family: inherit; font-weight: 600; cursor: pointer;
    }
    button:hover:not(:disabled) { background: #1B3E5C; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .msg {
      margin-top: 18px; padding: 12px 14px; border-radius: 9px;
      font-size: 14px; line-height: 1.6; text-align: left; display: none;
    }
    .msg.ok   { display: block; background: #E8F5EC; color: #1B6B37; border: 1px solid #BFE3CB; }
    .msg.err  { display: block; background: #FDECEC; color: #B3261E; border: 1px solid #F5C6C4; }
    .back { display: inline-block; margin-top: 22px; font-size: 14px; color: #C8102E; text-decoration: none; font-weight: 600; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <img src="assets/logo.png" alt="NEELKUND" />
    <h1>পাসওয়ার্ড ভুলে গেছেন?</h1>
    <p class="sub">আপনার ইমেল ঠিকানা লিখুন। আমরা সেখানে পাসওয়ার্ড বদলানোর একটি লিংক পাঠিয়ে দেব।</p>

    <div class="left">
      <label for="email">ইমেল ঠিকানা</label>
      <input id="email" type="email" placeholder="আপনার ইমেল" autocomplete="email" />
    </div>

    <button id="btn-send" type="button">রিসেট লিংক পাঠান</button>

    <div id="msg" class="msg"></div>

    <a class="back" href="login.html">← লগইন পাতায় ফিরুন</a>
  </div>

  <script>
    var API_BASE = "https://neelkund-backend.onrender.com";

    var emailEl = document.getElementById("email");
    var btn     = document.getElementById("btn-send");
    var msg     = document.getElementById("msg");

    function show(text, kind) {
      msg.textContent = text;
      msg.className = "msg " + kind;
    }

    btn.addEventListener("click", function () {
      var email = (emailEl.value || "").trim();

      msg.className = "msg";
      if (!email || email.indexOf("@") === -1) {
        show("সঠিক ইমেল ঠিকানা লিখুন।", "err");
        return;
      }

      btn.disabled = true;
      btn.textContent = "পাঠানো হচ্ছে...";

      fetch(API_BASE + "/api/auth/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email })
      })
        .then(function (res) {
          return res.text().then(function (t) {
            return { ok: res.ok, status: res.status, body: t };
          });
        })
        .then(function (r) {
          if (r.ok) {
            show("লিংক পাঠানো হয়েছে। ইমেলের ইনবক্স দেখুন (Spam ফোল্ডারও দেখে নেবেন)। লিংকটি ৩০ মিনিট পর্যন্ত কাজ করবে।", "ok");
          } else {
            var detail = "";
            try { detail = JSON.parse(r.body).message || ""; } catch (e) {}
            show(detail || ("পাঠানো যায়নি (কোড " + r.status + ")। একটু পরে আবার চেষ্টা করুন।"), "err");
            btn.disabled = false;
            btn.textContent = "রিসেট লিংক পাঠান";
          }
        })
        .catch(function () {
          show("সার্ভারে পৌঁছনো যাচ্ছে না। ইন্টারনেট দেখে নিয়ে আবার চেষ্টা করুন।", "err");
          btn.disabled = false;
          btn.textContent = "রিসেট লিংক পাঠান";
        });
    });

    emailEl.addEventListener("keydown", function (e) {
      if (e.key === "Enter") btn.click();
    });
  </script>
</body>
</html>
