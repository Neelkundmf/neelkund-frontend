<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEELKUND — Forgot Password</title>
<link rel="icon" href="assets/logo.png" />
  <script src="config.js"></script>
  <script src="api.js"></script>

  <style>
    html, body { height: 100%; }
    body {
      margin: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #102A40 0%, #0A1C2B 100%);
      padding: 24px;
    }
    .card {
      background: #fff; border-radius: 16px;
      width: 100%; max-width: 420px;
      padding: 34px 30px 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,.30);
      text-align: center;
    }
    .card img { width: 62px; height: 62px; margin-bottom: 18px; }
    .card h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 26px; color: #102A40; margin: 0 0 8px;
    }
    .card .sub {
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 14.5px; line-height: 1.65; color: #5E6B78; margin: 0 0 24px;
    }
    .left { text-align: left; }
    #btn-send { width: 100%; padding: 13px; font-size: 15px; margin-top: 6px; }

    .msg {
      display: none; text-align: left;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 14px; line-height: 1.55;
      padding: 12px 14px; border-radius: 8px; margin-bottom: 18px;
    }
    .msg-error   { background:#FBE5E3; color:#B71E15; border:1px solid #F3C4C0; }
    .msg-success { background:#E3F3EA; color:#136B42; border:1px solid #BFE3CF; }
    .msg-info    { background:#E6EEF5; color:#102A40; border:1px solid #CBD9E5; }

    .back {
      display: inline-block; margin-top: 22px;
      font-family: 'Hind Siliguri', sans-serif; font-size: 13.5px;
      color: #102A40; font-weight: 600; text-decoration: none;
    }
    .back:hover { text-decoration: underline; }

    .dots:after { content:""; animation: dots 1.4s steps(4,end) infinite; }
    @keyframes dots { 0%{content:"";}25%{content:".";}50%{content:"..";}75%{content:"...";} }

    /* পাঠানো হয়ে গেলে এই অংশটা দেখাবে */
    #sent-box { display: none; }
    #sent-box .tick {
      width: 58px; height: 58px; margin: 0 auto 16px;
      border-radius: 50%; background: #E3F3EA;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; color: #1E8E5A;
    }
  </style>
</head>

<body>
  <div class="card">

    <!-- ============ ফর্ম ============ -->
    <div id="form-box">
      <img src="assets/img/Nil_Khund.png" alt="NEELKUND" />
      <h1>Forgot Password?</h1>
      <p class="sub">আপনার ইমেল আইডি লিখুন। আমরা সেখানে পাসওয়ার্ড বদলানোর একটা লিংক পাঠিয়ে দেব।</p>

      <div id="msg" class="msg"></div>

      <div class="left">
        <label class="nk-label" for="email">Email Address</label>
        <input class="nk-input" type="email" id="email" autocomplete="email"
               placeholder="your@email.com" autofocus />
      </div>

      <button class="nk-btn nk-btn-primary" id="btn-send">Send Reset Link</button>
    </div>

    <!-- ============ পাঠানোর পর ============ -->
    <div id="sent-box">
      <div class="tick">✓</div>
      <h1>ইমেল পাঠানো হয়েছে</h1>
      <p class="sub">
        যদি এই ইমেল আইডিটা আমাদের কাছে নথিভুক্ত থাকে, তাহলে সেখানে লিংক পৌঁছে গেছে।<br><br>
        <b>ইমেল খুলে দেখুন।</b> না পেলে <b>Spam / Junk</b> ফোল্ডারটাও দেখুন।<br>
        লিংকটা <b>৩০ মিনিট</b> কাজ করবে।
      </p>
    </div>

    <a class="back" href="login.html">← Back to Login</a>
  </div>

  <script>
  (function () {
    "use strict";

    var U       = NK.utils;
    var msgBox  = U.qs("#msg");
    var emailIn = U.qs("#email");
    var btn     = U.qs("#btn-send");
    var formBox = U.qs("#form-box");
    var sentBox = U.qs("#sent-box");

    function showMsg(text, type) {
      msgBox.textContent = text;
      msgBox.className = "msg msg-" + (type || "error");
      msgBox.style.display = "block";
    }

    /* সার্ভার ঘুম থেকে জাগিয়ে রাখি */
    NK.api.wake();

    function send() {
      var email = emailIn.value.trim();

      if (!email) { showMsg("ইমেল আইডি লিখুন।"); emailIn.focus(); return; }
      if (!U.isEmail(email)) { showMsg("সঠিক ইমেল আইডি লিখুন।"); emailIn.focus(); return; }

      btn.disabled = true;
      btn.innerHTML = 'Sending<span class="dots"></span>';
      msgBox.style.display = "none";

      var slow = setTimeout(function () {
        showMsg("সার্ভার ঘুম থেকে উঠছে, একটু সময় লাগতে পারে…", "info");
      }, 5000);

      NK.api.auth.forgotPassword(email)
        .then(function () {
          clearTimeout(slow);
          formBox.style.display = "none";
          sentBox.style.display = "block";
        })
        .catch(function (err) {
          clearTimeout(slow);
          btn.disabled = false;
          btn.textContent = "Send Reset Link";
          showMsg((err && err.message) || "পাঠানো গেল না। আবার চেষ্টা করুন।", "error");
        });
    }

    U.on(btn, "click", send);
    U.on(emailIn, "keydown", function (e) {
      if (e.key === "Enter") send();
    });
  })();
  </script>
</body>
</html>
