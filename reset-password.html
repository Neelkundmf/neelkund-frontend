<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEELKUND — নতুন পাসওয়ার্ড</title>
  <link rel="icon" href="assets/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #102A40 0%, #0A1C2B 100%);
      padding: 24px;
      font-family: 'Hind Siliguri', system-ui, sans-serif;
    }
    .card {
      background: #fff; border-radius: 16px;
      width: 100%; max-width: 420px;
      padding: 34px 30px 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,.30);
      text-align: center;
    }
    .card img { width: 62px; height: 62px; margin-bottom: 18px; }
    .card h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 26px; color: #102A40; margin: 0 0 8px;
    }
    .sub { font-size: 14.5px; line-height: 1.65; color: #5E6B78; margin: 0 0 24px; }
    .left { text-align: left; margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #102A40; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 14px; font-size: 15px;
      border: 1px solid #D6DCE2; border-radius: 9px;
      font-family: inherit; outline: none;
    }
    input:focus { border-color: #102A40; box-shadow: 0 0 0 3px rgba(16,42,64,.10); }
    .hint { font-size: 12.5px; color: #8A96A2; margin-top: 6px; }
    button {
      width: 100%; padding: 13px; font-size: 15px; margin-top: 8px;
      background: #102A40; color: #fff; border: 0; border-radius: 9px;
      font-family: inherit; font-weight: 600; cursor: pointer;
    }
    button:hover:not(:disabled) { background: #1B3E5C; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .msg {
      margin-top: 18px; padding: 12px 14px; border-radius: 9px;
      font-size: 14px; line-height: 1.6; text-align: left; display: none;
    }
    .msg.ok  { display: block; background: #E8F5EC; color: #1B6B37; border: 1px solid #BFE3CB; }
    .msg.err { display: block; background: #FDECEC; color: #B3261E; border: 1px solid #F5C6C4; }
    .back { display: inline-block; margin-top: 22px; font-size: 14px; color: #C8102E; text-decoration: none; font-weight: 600; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <img src="assets/logo.png" alt="NEELKUND" />
    <h1>নতুন পাসওয়ার্ড দিন</h1>
    <p class="sub">নতুন পাসওয়ার্ড দুবার লিখুন। এরপর ফোন নম্বর ও নতুন পাসওয়ার্ড দিয়ে লগইন করবেন।</p>

    <div id="form-area">
      <div class="left">
        <label for="pw1">নতুন পাসওয়ার্ড</label>
        <input id="pw1" type="password" autocomplete="new-password" />
        <div class="hint">কমপক্ষে ৮টি অক্ষর</div>
      </div>

      <div class="left">
        <label for="pw2">আবার লিখুন</label>
        <input id="pw2" type="password" autocomplete="new-password" />
      </div>

      <button id="btn-save" type="button">পাসওয়ার্ড বদলান</button>
    </div>

    <div id="msg" class="msg"></div>

    <a class="back" href="login.html">← লগইন পাতায় ফিরুন</a>
  </div>

  <script>
    var API_BASE = "https://neelkund-backend.onrender.com";

    var pw1  = document.getElementById("pw1");
    var pw2  = document.getElementById("pw2");
    var btn  = document.getElementById("btn-save");
    var msg  = document.getElementById("msg");
    var form = document.getElementById("form-area");

    function show(text, kind) {
      msg.textContent = text;
      msg.className = "msg " + kind;
    }

    var token = new URLSearchParams(window.location.search).get("token");

    if (!token) {
      form.style.display = "none";
      show("লিংকটি ঠিক নয়। ইমেলে পাঠানো লিংকে সরাসরি ক্লিক করুন, অথবা নতুন করে রিসেট লিংক চান।", "err");
    }

    btn.addEventListener("click", function () {
      var a = pw1.value || "";
      var b = pw2.value || "";

      msg.className = "msg";

      if (a.length < 8) {
        show("পাসওয়ার্ড কমপক্ষে ৮টি অক্ষরের হতে হবে।", "err");
        return;
      }
      if (a !== b) {
        show("দুটো পাসওয়ার্ড মিলছে না। আবার দেখুন।", "err");
        return;
      }

      btn.disabled = true;
      btn.textContent = "বদলানো হচ্ছে...";

      fetch(API_BASE + "/api/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: token, newPassword: a })
      })
        .then(function (res) {
          return res.text().then(function (t) {
            return { ok: res.ok, status: res.status, body: t };
          });
        })
        .then(function (r) {
          if (r.ok) {
            form.style.display = "none";
            show("পাসওয়ার্ড বদলে গেছে। ৩ সেকেন্ডে লগইন পাতায় নিয়ে যাচ্ছি...", "ok");
            setTimeout(function () { window.location.href = "login.html"; }, 3000);
          } else {
            var detail = "";
            try { detail = JSON.parse(r.body).message || ""; } catch (e) {}
            show(detail || ("বদলানো যায়নি (কোড " + r.status + ")। লিংকটির মেয়াদ শেষ হয়ে থাকতে পারে — নতুন করে রিসেট লিংক চান।"), "err");
            btn.disabled = false;
            btn.textContent = "পাসওয়ার্ড বদলান";
          }
        })
        .catch(function () {
          show("সার্ভারে পৌঁছনো যাচ্ছে না। ইন্টারনেট দেখে নিয়ে আবার চেষ্টা করুন।", "err");
          btn.disabled = false;
          btn.textContent = "পাসওয়ার্ড বদলান";
        });
    });

    pw2.addEventListener("keydown", function (e) {
      if (e.key === "Enter") btn.click();
    });
  </script>
</body>
</html>
