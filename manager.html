<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0F2942">
    <title>NEELKUND — ম্যানেজার</title>

    <link rel="icon" href="assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Hind+Siliguri:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/nk.css">
    <link rel="stylesheet" href="assets/css/app.css">

    <style>
        /* ---- লোনের অনুরোধ ---- */
        .req {
            background: var(--card);
            border: 1px solid var(--line);
            border-left: 4px solid var(--amber);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
        }
        .req .top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .req .top b { font-size: 15.5px; }
        .req .amt {
            font-family: 'Manrope', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: var(--navy);
        }

        .req .info {
            font-size: 12.5px;
            color: var(--muted);
            line-height: 1.9;
            padding: 10px 12px;
            background: var(--paper);
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .req .info b { color: var(--ink); }

        .req .warn {
            padding: 9px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .req .warn.ok   { background: var(--green-soft); color: var(--green); }
        .req .warn.mid  { background: var(--amber-soft); color: var(--amber); }
        .req .warn.bad  { background: var(--red-soft);   color: var(--red); }

        .req .acts { display: flex; gap: 8px; }
        .req .acts button { flex: 1; }

        /* ---- কাগজ ---- */
        @media print {
            .topbar, .tabs, .noprint { display: none !important; }
            body { background: #fff; }
            .body { padding: 0; }
            .sheet { box-shadow: none; border: 0; }
            .sheet table { font-size: 11px; }
        }

        .sheet {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 14px;
        }
        .sheet .hd {
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--navy);
            margin-bottom: 14px;
        }
        .sheet .hd h2 { font-size: 17px; margin-bottom: 4px; }
        .sheet .hd p  { margin: 0; font-size: 12.5px; color: var(--muted); }

        .sheet table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12.5px;
        }
        .sheet th {
            text-align: left;
            padding: 7px 6px;
            border-bottom: 1.5px solid var(--line);
            font-size: 11px;
            color: var(--muted);
            font-weight: 700;
        }
        .sheet td {
            padding: 8px 6px;
            border-bottom: 1px solid var(--line);
        }
        .sheet td.r, .sheet th.r { text-align: right; }

        .sheet .mkt {
            margin: 16px 0 8px;
            padding: 7px 10px;
            background: var(--paper);
            border-radius: 7px;
            font-size: 13px;
            font-weight: 700;
        }

        .sheet .tot {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 2px solid var(--navy);
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: 800;
        }

        .sheet .sign {
            display: flex;
            gap: 30px;
            margin-top: 34px;
            padding-top: 10px;
        }
        .sheet .sign div {
            flex: 1;
            border-top: 1px solid var(--ink);
            padding-top: 5px;
            font-size: 11.5px;
            text-align: center;
            color: var(--muted);
        }
        /* ---- ম্যানেজার ড্যাশবোর্ড — স্বাগত ব্যানার ---- */
        .mgr-hello {
            background: linear-gradient(135deg, #0F766E, #2563EB);
            border-radius: 18px;
            padding: 18px 20px;
            color: #fff;
            margin-bottom: 16px;
            box-shadow: 0 8px 22px rgba(37,99,235,.18);
        }
        .mgr-hello .br {
            font-size: 12.5px;
            opacity: .9;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .mgr-hello .wel {
            font-size: 21px;
            font-weight: 800;
            margin-top: 4px;
        }

        /* ---- উপরের ৪ বক্স ---- */
        .mgr-top {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 18px;
        }
        .mgr-stat {
            border-radius: 16px;
            padding: 15px;
            color: #fff;
            box-shadow: 0 6px 16px rgba(15,41,66,.12);
        }
        .mgr-stat .l { font-size: 12px; opacity: .92; }
        .mgr-stat .v {
            font-family: 'Manrope', sans-serif;
            font-size: 22px;
            font-weight: 800;
            margin-top: 5px;
        }
        .mgr-stat .sub {
            font-size: 11px;
            opacity: .9;
            margin-top: 6px;
            line-height: 1.5;
        }
        .mgr-stat.s0 { background: linear-gradient(135deg, #DC2626, #F87171); }
        .mgr-stat.s1 { background: linear-gradient(135deg, #16A34A, #4ADE80); }
        .mgr-stat.s2 { background: linear-gradient(135deg, #2563EB, #60A5FA); }
        .mgr-stat.s3 { background: linear-gradient(135deg, #7C3AED, #A78BFA); }

        /* ---- মার্কেট সারি ---- */
        .mgr-mkt-title {
            font-size: 15px;
            font-weight: 800;
            color: var(--navy);
            margin: 4px 0 12px;
            text-align: center;
        }
        .mgr-mkt-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .mgr-mkt {
            border-radius: 16px;
            padding: 15px;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(16,185,129,.18);
            transition: transform .15s;
            background: linear-gradient(135deg, #0EA5A4, #22C55E);
        }
        .mgr-mkt:nth-child(even) {
            background: linear-gradient(135deg, #2563EB, #38BDF8);
            box-shadow: 0 8px 20px rgba(37,99,235,.18);
        }
        .mgr-mkt:active { transform: scale(.97); }
        .mgr-mkt .nm {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .mgr-mkt .rows > div {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 3px 0;
            opacity: .95;
        }
        .mgr-mkt .rows b {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
        }
        .mgr-mkt .od {
            margin-top: 8px;
            background: rgba(0,0,0,.18);
            border-radius: 9px;
            padding: 5px 10px;
            font-size: 12px;
            text-align: center;
            font-weight: 700;
        }
        /* ---- এজেন্ট ট্যাব ---- */
        .ag-list .ag-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            border: 1px solid var(--line);
            border-left: 4px solid #2563EB;
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform .12s;
        }
        .ag-list .ag-item:active { transform: scale(.99); }
        .ag-list .ag-av {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563EB, #0EA5A4);
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 800;
            flex-shrink: 0;
        }
        .ag-list .ag-nm { font-size: 15px; font-weight: 700; }
        .ag-list .ag-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
        .ag-list .ag-arrow { margin-left: auto; color: var(--muted); font-size: 20px; }

        /* এজেন্টের মার্কেট */
        .agm-head {
            background: linear-gradient(135deg, #0F766E, #2563EB);
            border-radius: 16px;
            padding: 16px;
            color: #fff;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .agm-head .ph {
            width: 54px; height: 54px;
            border-radius: 50%;
            background: rgba(255,255,255,.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 800;
            overflow: hidden;
            flex-shrink: 0;
        }
        .agm-head .ph img { width: 100%; height: 100%; object-fit: cover; }
        .agm-head .nm { font-size: 18px; font-weight: 800; }
        .agm-head .sub { font-size: 12px; opacity: .9; margin-top: 2px; }

        .agm-mkt {
            background: #fff;
            border: 1px solid var(--line);
            border-left: 4px solid #22C55E;
            border-radius: 13px;
            padding: 14px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: transform .12s;
        }
        .agm-mkt:active { transform: scale(.99); }
        .agm-mkt .nm { font-size: 15px; font-weight: 700; }
        .agm-mkt .ar { margin-left: auto; color: var(--muted); font-size: 20px; }

        /* মার্কেটের আজকের হিসাব */
        .agm-stat {
            background: #fff;
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 4px 14px rgba(15,41,66,.07);
        }
        .agm-stat .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--line);
        }
        .agm-stat .row:last-child { border-bottom: 0; }
        .agm-stat .row .l { font-size: 14px; color: var(--muted); }
        .agm-stat .row .v {
            font-family: 'Manrope', sans-serif;
            font-size: 18px;
            font-weight: 800;
        }
        .agm-stat .row .v.g { color: #16A34A; }
        .agm-stat .row .v.r { color: var(--red); }
        /* ---- আজকের রিপোর্ট ---- */
        .rep-sec {
            font-size: 14px;
            font-weight: 800;
            color: var(--navy);
            margin: 20px 0 12px;
            padding-left: 10px;
            border-left: 4px solid #2563EB;
        }

        /* এজেন্ট বক্স সারি */
        .rep-ag-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .rep-ag {
            border-radius: 15px;
            padding: 14px;
            color: #fff;
            background: linear-gradient(135deg, #2563EB, #0EA5A4);
            box-shadow: 0 6px 16px rgba(37,99,235,.16);
        }
        .rep-ag:nth-child(even) {
            background: linear-gradient(135deg, #0F766E, #22C55E);
        }
        .rep-ag .nm {
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .rep-ag .r {
            display: flex;
            justify-content: space-between;
            font-size: 11.5px;
            padding: 2px 0;
            opacity: .95;
        }
        .rep-ag .r b { font-family: 'Manrope', sans-serif; font-weight: 800; }

        /* ব্রাঞ্চ মোট — বড় লাইন */
        .rep-branch {
            background: #fff;
            border-radius: 16px;
            padding: 6px 16px;
            box-shadow: 0 4px 14px rgba(15,41,66,.07);
        }
        .rep-branch .line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 0;
            border-bottom: 1px solid var(--line);
        }
        .rep-branch .line:last-child { border-bottom: 0; }
        .rep-branch .line .l { font-size: 13.5px; color: var(--ink); }
        .rep-branch .line .v {
            font-family: 'Manrope', sans-serif;
            font-size: 17px;
            font-weight: 800;
        }
        .rep-branch .line .v.g { color: #16A34A; }
        .rep-branch .line .v.r { color: var(--red); }

        /* DB হিসাব */
        .rep-db {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .rep-db .cell {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 13px;
            padding: 13px;
            text-align: center;
        }
        .rep-db .cell .l { font-size: 12px; color: var(--muted); }
        .rep-db .cell .v {
            font-family: 'Manrope', sans-serif;
            font-size: 21px;
            font-weight: 800;
            margin-top: 4px;
        }

        /* Disbursement টেবিল */
        .rep-tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .rep-tbl {
            width: 100%;
            border-collapse: collapse;
            font-size: 12.5px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
        }
        .rep-tbl th, .rep-tbl td {
            padding: 9px 8px;
            text-align: center;
            border-bottom: 1px solid var(--line);
            white-space: nowrap;
        }
        .rep-tbl th {
            background: var(--navy);
            color: #fff;
            font-weight: 700;
            font-size: 11.5px;
        }
        .rep-tbl td.nm { text-align: left; font-weight: 600; }
        .rep-tbl tr:last-child td {
            font-weight: 800;
            background: #F0F5FF;
            border-bottom: 0;
        }
        .rep-tbl .tot-col { font-weight: 800; color: var(--navy); }

        /* ডাউনলোড */
        .rep-dl {
            width: 100%;
            min-height: 52px;
            border: 0;
            border-radius: 14px;
            background: linear-gradient(135deg, #16A34A, #22C55E);
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 18px;
        }
        .rep-dl:active { transform: scale(.98); }
        /* ---- গ্রাহক তালিকা (টোটাল কাস্টমার আন্ডার ব্রাঞ্চ) ---- */
        .bc-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            border: 1px solid var(--line);
            border-left: 4px solid #2563EB;
            border-radius: 13px;
            padding: 12px 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform .12s;
        }
        .bc-card:active { transform: scale(.99); }
        .bc-card .av {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563EB, #0EA5A4);
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 17px; font-weight: 800;
            flex-shrink: 0;
        }
        .bc-card .mid { flex: 1; min-width: 0; }
        .bc-card .nm { font-size: 15px; font-weight: 700; }
        .bc-card .sub {
            font-size: 12px; color: var(--muted); margin-top: 2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .bc-card .end { text-align: right; flex-shrink: 0; }
        .bc-card .end .out {
            font-family: 'Manrope', sans-serif;
            font-size: 15px; font-weight: 800; color: var(--navy);
        }
        .bc-card .end .lid { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
        .bc-card .end .od {
            font-size: 10.5px; font-weight: 700; margin-top: 2px;
        }
        .bc-card .end .od.r { color: var(--red); }

        /* অঙ্ক-বক্স : Running / OD / Blacklist */
        .bc-boxes-title {
            font-size: 14px; font-weight: 800; color: var(--navy);
            margin: 20px 0 12px; text-align: center;
        }
        .bc-boxes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .bc-box {
            border-radius: 15px;
            padding: 15px;
            color: #fff;
            box-shadow: 0 6px 16px rgba(15,41,66,.14);
        }
        .bc-box.b0 { background: linear-gradient(135deg, #2563EB, #38BDF8); }
        .bc-box.b1 { background: linear-gradient(135deg, #7C3AED, #A855F7); }
        .bc-box.b2 { background: linear-gradient(135deg, #0EA5A4, #22C55E); }
        .bc-box.b3 { background: linear-gradient(135deg, #EA580C, #F97316); }
        .bc-box.b4 { background: linear-gradient(135deg, #DB2777, #EC4899); }
        .bc-box .amt {
            font-family: 'Manrope', sans-serif;
            font-size: 22px; font-weight: 800; margin-bottom: 10px;
        }
        .bc-box .r {
            display: flex; justify-content: space-between;
            font-size: 12.5px; padding: 3px 0; opacity: .96;
        }
        .bc-box .r b { font-family: 'Manrope', sans-serif; font-weight: 800; }
        /* ---- ব্ল্যাকলিস্ট তালিকা ---- */
        .bl-top {
            background: linear-gradient(135deg, #7F1D1D, #B91C1C);
            border-radius: 16px;
            padding: 16px;
            color: #fff;
            margin-bottom: 14px;
            text-align: center;
        }
        .bl-top .n {
            font-family: 'Manrope', sans-serif;
            font-size: 28px;
            font-weight: 800;
        }
        .bl-top .l { font-size: 12.5px; opacity: .9; margin-top: 2px; }

        .bl-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            border: 1px solid var(--line);
            border-left: 4px solid #B91C1C;
            border-radius: 13px;
            padding: 12px 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform .12s;
        }
        .bl-card:active { transform: scale(.99); }
        .bl-card .av {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: #1F2937;
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800;
            flex-shrink: 0;
            flex-direction: column;
            line-height: 1.1;
        }
        .bl-card .av .d { font-size: 13px; }
        .bl-card .av .u { font-size: 8px; opacity: .8; }
        .bl-card .mid { flex: 1; min-width: 0; }
        .bl-card .nm { font-size: 15px; font-weight: 700; }
        .bl-card .sub {
            font-size: 12px; color: var(--muted); margin-top: 2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .bl-card .end { text-align: right; flex-shrink: 0; }
        .bl-card .end .ov {
            font-family: 'Manrope', sans-serif;
            font-size: 15px; font-weight: 800; color: var(--red);
        }
        .bl-card .end .paid { font-size: 11px; color: #16A34A; margin-top: 2px; }
        .bl-card .end .lid { font-size: 10px; color: var(--muted); margin-top: 2px; }

        /* ===== নতুন কাস্টমার প্রোফাইল পাতা ===== */
        #profX {
            position: fixed; inset: 0; z-index: 400;
            background: var(--bg, #F4F6F8);
            display: none; flex-direction: column;
        }
        #profX.on { display: flex; }
        #profX .pbar {
            display: flex; align-items: center; gap: 12px;
            background: var(--navy); color: #fff;
            padding: 14px 16px; padding-top: max(14px, env(safe-area-inset-top));
            flex-shrink: 0;
        }
        #profX .pbar button {
            width: 38px; height: 38px; flex-shrink: 0;
            background: rgba(255,255,255,.14); border: 0; border-radius: 10px;
            color: #fff; font-size: 18px; cursor: pointer;
        }
        #profX .pbar .cid { font-size: 12px; opacity: .8; }
        #profX .pbar b { font-size: 15px; }
        #profX .pin {
            flex: 1; overflow-y: auto;
            padding: 16px 16px calc(20px + env(safe-area-inset-bottom));
        }
        .pf-head { display: flex; gap: 14px; margin-bottom: 14px; }
        .pf-photo {
            width: 92px; height: 92px; flex-shrink: 0;
            border-radius: 14px;
            background: #1F2937; color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 34px; font-weight: 800;
            background-size: cover; background-position: center; overflow: hidden;
        }
        .pf-info { flex: 1; min-width: 0; }
        .pf-info .nm { font-size: 18px; font-weight: 800; color: var(--navy); }
        .pf-info .li {
            font-size: 12.5px; color: var(--muted); margin-top: 3px;
            display: flex; gap: 5px;
        }
        .pf-info .li b { color: var(--navy); font-weight: 700; }
        .pf-green {
            background: #ECFDF5; border: 1px solid #A7F3D0;
            border-radius: 12px; padding: 12px 14px; margin-bottom: 14px;
        }
        .pf-green .r {
            display: flex; justify-content: space-between; gap: 10px;
            font-size: 12.5px; padding: 4px 0;
        }
        .pf-green .r span { color: #047857; }
        .pf-green .r b { color: var(--navy); font-weight: 700; text-align: right; }
        .pf-remark {
            border-radius: 12px; padding: 12px 14px; margin-bottom: 14px;
            border: 1px solid var(--line);
        }
        .pf-remark .rl {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: .5px; margin-bottom: 4px; opacity: .7;
        }
        .pf-remark .rt { font-size: 13.5px; font-weight: 600; }

<script src="assets/js/nk.js"></script>
<script>
    (function () {
        "use strict";

        var q = function (id) { return document.getElementById(id); };

        function toast(m, kind) {
            var t = document.createElement("div");
            t.className = "tst " + (kind || "in");
            t.textContent = m;
            q("toast").appendChild(t);
            setTimeout(function () { if (t.parentNode) t.parentNode.removeChild(t); }, 3600);
        }

        /* ---------- CSV ডাউনলোড হেল্পার (Excel-এ খোলে, বাংলা ঠিক দেখায়) ---------- */
        function csvCell(v) {
            var s = (v === null || v === undefined) ? "" : String(v);
            s = s.replace(/"/g, '""');
            return '"' + s + '"';
        }

        function csvDownload(fileName, rows) {
            try {
                var body = rows.map(function (r) {
                    return r.map(csvCell).join(",");
                }).join("\r\n");

                /* BOM না দিলে Excel-এ বাংলা ভেঙে যায় */
                var blob = new Blob(["\uFEFF" + body], { type: "text/csv;charset=utf-8;" });
                var url = URL.createObjectURL(blob);

                var a = document.createElement("a");
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(function () { URL.revokeObjectURL(url); }, 1500);

                toast("ফাইল ডাউনলোড হয়েছে ✓", "ok");
            } catch (e) {
                toast("ডাউনলোড করা গেল না: " + e.message, "er");
            }
        }

        function todayStamp() {
            var d = new Date();
            return d.getFullYear() + "-" +
                String(d.getMonth() + 1).padStart(2, "0") + "-" +
                String(d.getDate()).padStart(2, "0");
        }
        function st(l, v, tone) {
            return '<div class="stat"><div class="l">' + NK.esc(l) +
                '</div><div class="v ' + (tone || "") + '">' + NK.esc(String(v)) + '</div></div>';
        }

        var TITLES = {
            dash: "ড্যাশবোর্ড", agent: "এজেন্ট", report: "আজকের রিপোর্ট",
            req: "লোনের অনুরোধ", sheet: "কাগজ", cust: "গ্রাহক",
            od: "ব্ল্যাকলিস্ট (১২০+ দিন)"
        };
        var loaded = {};

        function show(key) {
            Array.prototype.forEach.call(document.querySelectorAll(".view"), function (v) {
                v.classList.remove("on");
            });
            q("v-" + key).classList.add("on");

            Array.prototype.forEach.call(document.querySelectorAll(".tabs button"), function (b) {
                b.classList.toggle("on", b.getAttribute("data-v") === key);
            });

            q("ttl").textContent = TITLES[key];
            window.scrollTo(0, 0);

            if (!loaded[key]) {
                loaded[key] = true;
                if (key === "dash")   loadDash();
                if (key === "agent")  loadAgents();
                if (key === "report") loadReport();
                if (key === "req")    loadReq();
                if (key === "sheet")  loadSheet();
                if (key === "cust")   loadCust();
                if (key === "od")     loadOd();
            }
        }

        Array.prototype.forEach.call(document.querySelectorAll(".tabs button[data-v]"), function (b) {
            b.addEventListener("click", function () { show(b.getAttribute("data-v")); });
        });


        /* =====================================================================
         * ড্যাশবোর্ড
         * ===================================================================== */

        /* =====================================================================
          * এজেন্ট ট্যাব — তালিকা → মার্কেট → আজকের হিসাব
          * ===================================================================== */
        var AG_ID = null;
        var AG_NAME = "";

        function loadAgents() {
            q("agListWrap").style.display = "block";
            q("agMktWrap").style.display = "none";
            q("agDetWrap").style.display = "none";

            q("agList").innerHTML = '<div class="loading">লোড হচ্ছে...</div>';

            NK.GET("/api/manager/users?role=AGENT").then(function (list) {
                var rows = NK.rows(list);

                if (!rows.length) {
                    q("agList").innerHTML =
                        '<div class="card"><div class="empty">এই ব্রাঞ্চে কোনো এজেন্ট নেই</div></div>';
                    return;
                }

                var h = '<div class="ag-list">';
                rows.forEach(function (a) {
                    var first = (a.fullName || "?").charAt(0);
                    h += '<div class="ag-item" data-id="' + a.id +
                        '" data-name="' + NK.esc(a.fullName) + '">';
                    h += '<div class="ag-av">' + NK.esc(first) + '</div>';
                    h += '<div><div class="ag-nm">' + NK.esc(a.fullName) + '</div>' +
                        '<div class="ag-sub">' + NK.esc(a.phone || "") + '</div></div>';
                    h += '<div class="ag-arrow">›</div>';
                    h += '</div>';
                });
                h += '</div>';

                q("agList").innerHTML = h;

                Array.prototype.forEach.call(q("agList").querySelectorAll("[data-id]"), function (el) {
                    el.addEventListener("click", function () {
                        openAgentMarkets(el.getAttribute("data-id"), el.getAttribute("data-name"));
                    });
                });
            }).catch(function (e) {
                q("agList").innerHTML =
                    '<div class="card"><div class="empty">' + NK.esc(e.message) + '</div></div>';
            });
        }

        q("agBack").addEventListener("click", function () {
            q("agMktWrap").style.display = "none";
            q("agListWrap").style.display = "block";
        });

        q("agDetBack").addEventListener("click", function () {
            q("agDetWrap").style.display = "none";
            q("agMktWrap").style.display = "block";
        });
        function openAgentMarkets(agentId, agentName) {
            AG_ID = agentId;
            AG_NAME = agentName || "এজেন্ট";

            q("agListWrap").style.display = "none";
            q("agDetWrap").style.display = "none";
            q("agMktWrap").style.display = "block";
            window.scrollTo(0, 0);

            var first = AG_NAME.charAt(0);
            q("agMktHead").innerHTML =
                '<div class="agm-head">' +
                '<div class="ph">' + NK.esc(first) + '</div>' +
                '<div><div class="nm">' + NK.esc(AG_NAME) + '</div>' +
                '<div class="sub">মার্কেট বাছুন</div></div>' +
                '</div>';

            q("agMktList").innerHTML = '<div class="loading">লোড হচ্ছে...</div>';

            NK.GET("/api/agent/" + agentId + "/markets").then(function (d) {
                var mkts = (d && d.markets) ? d.markets : [];

                if (!mkts.length) {
                    q("agMktList").innerHTML =
                        '<div class="card"><div class="empty">এই এজেন্টের কোনো মার্কেট নেই</div></div>';
                    return;
                }

                var h = "";
                mkts.forEach(function (m) {
                    h += '<div class="agm-mkt" data-mkt="' + (m.marketId || "") +
                        '" data-mname="' + NK.esc(m.marketName) + '">';
                    h += '<div class="nm">🏬 ' + NK.esc(m.marketName) + '</div>';
                    h += '<div class="ar">›</div>';
                    h += '</div>';
                });

                q("agMktList").innerHTML = h;

                Array.prototype.forEach.call(q("agMktList").querySelectorAll("[data-mkt]"), function (el) {
                    el.addEventListener("click", function () {
                        openAgentMarketDetail(el.getAttribute("data-mkt"), el.getAttribute("data-mname"), m);
                    });
                });

                /* মার্কেট ডেটা ধরে রাখি হিসাবের জন্য */
                AG_MKTS = mkts;
            }).catch(function (e) {
                q("agMktList").innerHTML =
                    '<div class="card"><div class="empty">' + NK.esc(e.message) + '</div></div>';
            });
        }

        var AG_MKTS = [];

        function openAgentMarketDetail(marketId, marketName) {
            q("agMktWrap").style.display = "none";
            q("agDetWrap").style.display = "block";
            window.scrollTo(0, 0);

            /* ধরে রাখা মার্কেট ডেটা থেকে হিসাব */
            var m = AG_MKTS.filter(function (x) {
                return String(x.marketId) === String(marketId);
            })[0] || {};

            var h = "";

            h += '<div class="agm-head">';

                if (d.closedOnDay) h += ldRow("কত দিনে শোধ", d.closedOnDay + " দিনে", "g");

                h += '<div class="ld-box">';
                h += ldRow("ওভারডিউ ডেট", d.overdueDate ? NK.dt(d.overdueDate) : "নেই",
                    d.overdueDate ? "r" : "g");
                h += ldRow("ডিলে পেমেন্ট", (d.delayDays || 0) + " দিন",
                    (d.delayDays > 0) ? "r" : "g");
                h += ldRow("লাস্ট পেমেন্ট ডেট",
                    d.lastPaymentDate ? NK.dt(d.lastPaymentDate) : "এখনও কিছু আসেনি");
                if (d.lastPaymentAmount)
                    h += ldRow("লাস্ট পেমেন্ট অঙ্ক", NK.inr(d.lastPaymentAmount), "g");
                h += ldRow("এজেন্ট", d.agentName || "—");
                h += '</div>';

                /* ---- ক্যালেন্ডার ---- */
                h += '<div class="ld-title">📅 EMI ও পেমেন্ট ক্যালেন্ডার</div>';

                h += '<div class="ld-legend">';
                h += '<span><i style="background:#16A34A;"></i>টাকা এসেছে</span>';
                h += '<span><i style="background:#FEE2E2;"></i>আসেনি</span>';
                h += '<span><i style="background:#FEF9E7;"></i>দিন আসেনি</span>';
                h += '<span><i style="background:#DBEAFE;"></i>বাড়তি জমা</span>';
                h += '</div>';

                var emis = d.emis || [];
                var pays = d.payments || [];

                if (!emis.length) {
                    h += '<div class="card"><div class="empty">কিস্তির তালিকা তৈরি হয়নি</div></div>';
                    q("lxBody").innerHTML = h;
                    return;
                }

                /* তারিখ → তথ্য */
                var emiMap = {};
                emis.forEach(function (e) { emiMap[e.dueDate] = e; });

                var payMap = {};
                pays.forEach(function (p) {
                    payMap[p.paymentDate] = Number(p.amount || 0) + (payMap[p.paymentDate] || 0);
                });

                /* কোন কোন দিন দেখাব — EMI-র সব দিন + পেমেন্টের সব দিন */
                var allDates = [];
                Object.keys(emiMap).forEach(function (k) { allDates.push(k); });
                Object.keys(payMap).forEach(function (k) {
                    if (allDates.indexOf(k) === -1) allDates.push(k);
                });
                allDates.sort();

                var first = new Date(allDates[0] + "T00:00:00");
                var last = new Date(allDates[allDates.length - 1] + "T00:00:00");
                var todayK = ldKey(new Date());

                var cur = new Date(first.getFullYear(), first.getMonth(), 1);
                var stop = new Date(last.getFullYear(), last.getMonth(), 1);

                while (cur <= stop) {
                    var yy = cur.getFullYear();
                    var mm = cur.getMonth();

                    h += '<div class="ld-month">';
                    h += '<div class="mh">' + LD_MONTHS[mm] + ' ' + yy + '</div>';
                    h += '<div class="ld-grid">';

                    LD_WEEK.forEach(function (w) {
                        h += '<div class="dw">' + w + '</div>';
                    });

                    var startDow = new Date(yy, mm, 1).getDay();
                    for (var b = 0; b < startDow; b++) {
                        h += '<div class="ld-cell blank"></div>';
                    }

                    var daysInMonth = new Date(yy, mm + 1, 0).getDate();
                    for (var dd = 1; dd <= daysInMonth; dd++) {
                        var key = yy + "-" + String(mm + 1).padStart(2, "0") + "-" +
                            String(dd).padStart(2, "0");

                        var e = emiMap[key];
                        var paid = payMap[key];

                        var cls = "ld-cell";
                        var note = "";

                        if (paid) {
                            cls += e ? " paid" : " extra";
                            note = '<span class="pm">' + NK.inrShort(paid) + '</span>';
                        } else if (e) {
                            if (e.status === "PAID") {
                                cls += " paid";
                            } else if (key < todayK) {
                                cls += " miss";
                            } else {
                                cls += " due";
                            }
                        }

                        h += '<div class="' + cls + '">' + dd + note + '</div>';
                    }

                    h += '</div></div>';
                    cur = new Date(yy, mm + 1, 1);
                }

                q("lxBody").innerHTML = h;

            }).catch(function (e) {
                q("lxTitle").textContent = "লোন #" + loanId;
                q("lxBody").innerHTML = '<div class="card"><div class="empty">' +
                    NK.esc(e.message) + '</div></div>';
            });
        }

            });
            h += '</div>';
            q("bcBoxes").innerHTML = h;
        }

        function drawBcList() {
            var s = q("bcq").value.trim().toLowerCase();

            var list = BC_ALL.filter(function (c) {
                if (!s) return true;
                return (c.customerName || "").toLowerCase().indexOf(s) !== -1
                    || (c.customerCode || "").toLowerCase().indexOf(s) !== -1
                    || (c.customerPhone || "").indexOf(s) !== -1;
            });

            if (!list.length) {
                q("bcList").innerHTML = '<div class="card"><div class="empty">কেউ নেই</div></div>';
                return;
            }

            var h = "";
            list.slice(0, 200).forEach(function (c) {
                var closed = c.status === "CLOSED";
                h += '<div class="bc-card" data-prof="' + c.customerId + '">';
                h += '<div class="av">' + NK.esc((c.customerName || "?").charAt(0)) + '</div>';

                h += '<div class="mid">';
                h += '<div class="nm">' + NK.esc(c.customerName) + '</div>';
                h += '<div class="sub">' + NK.esc(c.customerCode || "") +
                    ' · এজেন্ট ' + NK.esc(c.agentName || "—") +
                    (c.marketName ? ' · ' + NK.esc(c.marketName) : '') + '</div>';
                if (c.address) {
                    h += '<div class="sub">📍 ' + NK.esc(c.address) + '</div>';
                }
                h += '</div>';

                h += '<div class="end">';
                h += '<div class="out">' + NK.inrShort(c.currentOutstanding) + '</div>';
                h += '<div class="lid">লোন #' + c.loanId + '</div>';
                if (closed) {
                    h += '<div class="od" style="color:#16A34A;">শোধ</div>';
                } else if (c.daysOverdue > 0) {
                    h += '<div class="od r">' + c.daysOverdue + ' দিন</div>';
                }
                h += '</div>';

                h += '</div>';
            });

            if (list.length > 200) {
                h += '<div class="hint" style="text-align:center;margin-top:8px;">' +
                    'প্রথম ২০০ জন দেখানো হচ্ছে — খুঁজে বের করুন</div>';
            }

            q("bcList").innerHTML = h;

            /* কাস্টমারে টাচ → প্রোফাইল (পরে বানানো হবে) */
            Array.prototype.forEach.call(q("bcList").querySelectorAll("[data-prof]"), function (el) {
                el.addEventListener("click", function () {
                    openCustomerProfile(el.getAttribute("data-prof"));
                });
            });
        }

        q("bcq").addEventListener("input", function () {
            clearTimeout(bcTimer);
            bcTimer = setTimeout(drawBcList, 300);
        });


        /* =====================================================================
         * OD
         * ===================================================================== */
        /* =====================================================================
            * ব্ল্যাকলিস্ট — ১২০+ দিন (odDays এর বেশি)
            * ===================================================================== */
        var BL_ALL = [];
        var blTimer = null;

        function loadOd() {
            q("odList").innerHTML = '<div class="loading">লোড হচ্ছে...</div>';

            NK.GET("/api/dashboard/od-customers").then(function (list) {
                BL_ALL = NK.rows(list);
                drawBlList();
            }).catch(function (e) {
                q("odList").innerHTML =
                    '<div class="card"><div class="empty">' + NK.esc(e.message) + '</div></div>';
            });
        }

        function drawBlList() {
            var s = (q("blq") ? q("blq").value.trim().toLowerCase() : "");

            var list = BL_ALL.filter(function (c) {
                if (!s) return true;
                return (c.customerName || "").toLowerCase().indexOf(s) !== -1
                    || (c.customerCode || "").toLowerCase().indexOf(s) !== -1
                    || (c.customerPhone || "").indexOf(s) !== -1;
            });

            var total = BL_ALL.reduce(function (a, x) {
                return a + Number(x.outstanding || 0);
            }, 0);

            var h = "";

            h += '<div class="bl-top">';
            h += '<div class="n">' + BL_ALL.length + ' জন</div>';
            h += '<div class="l">ব্ল্যাকলিস্টে · মোট বাকি ' + NK.inr(total) + '</div>';
            h += '</div>';

            h += '<div class="search"><span class="ic">🔍</span>' +
                '<input id="blq" type="search" placeholder="নাম / আইডি / ফোন খুঁজুন" value="' +
                (s ? NK.esc(q("blq").value) : "") + '"></div>';

            if (!list.length) {
                h += '<div class="card"><div class="empty">কেউ নেই</div></div>';
            } else {
                list.slice(0, 200).forEach(function (x) {
                    h += '<div class="bl-card" data-prof="' + x.customerId + '">';

                    h += '<div class="av"><span class="d">' + x.daysOverdue +
                        '</span><span class="u">দিন</span></div>';

                    h += '<div class="mid">';
                    h += '<div class="nm">' + NK.esc(x.customerName) + '</div>';
                    h += '<div class="sub">' + NK.esc(x.customerPhone || "—") +
                        ' · এজেন্ট ' + NK.esc(x.agentName || "—") +
                        (x.marketName ? ' · ' + NK.esc(x.marketName) : '') + '</div>';
                    h += '<div class="sub">লোন ₹' + NK.inr(x.principal) +
                        ' · #' + x.loanId + '</div>';
                    h += '</div>';

                    h += '<div class="end">';
                    h += '<div class="ov">' + NK.inrShort(x.outstanding) + '</div>';
                    h += '<div class="paid">শোধ ' + NK.inrShort(x.totalPaid) + '</div>';
                    h += '</div>';

                    h += '</div>';
                });

                if (list.length > 200) {
                    h += '<div class="hint" style="text-align:center;margin-top:8px;">' +
                        'প্রথম ২০০ জন — খুঁজে বের করুন</div>';
                }
            }

            q("odList").innerHTML = h;

            if (q("blq")) {
                q("blq").addEventListener("input", function () {
                    clearTimeout(blTimer);
                    blTimer = setTimeout(drawBlList, 300);
                });
                if (s) {
                    var el = q("blq");
                    el.focus();
                    el.setSelectionRange(el.value.length, el.value.length);
                }
            }

            Array.prototype.forEach.call(q("odList").querySelectorAll("[data-prof]"), function (el) {
                el.addEventListener("click", function () {
                    openCustomerProfile(el.getAttribute("data-prof"));
                });
            });
        }

        /* =====================================================================
         * নোটিফিকেশন
         * ===================================================================== */
        /* =====================================================================
          * গ্রাহকের প্রোফাইল
          * ===================================================================== */
        var GEN_BN = { MALE: "পুরুষ", FEMALE: "মহিলা", OTHER: "অন্য" };

        function row(label, value) {
            if (value === null || value === undefined || value === "") return "";
            return '<div style="display:flex;justify-content:space-between;gap:12px;' +
                'padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px;">' +
                '<span style="color:var(--muted);">' + NK.esc(label) + '</span>' +
                '<b style="text-align:right;">' + NK.esc(String(value)) + '</b></div>';
        }

        q("pClose").addEventListener("click", function () {
            q("prof").classList.remove("on");
        });

        function bindCust() {
            Array.prototype.forEach.call(q("cList").querySelectorAll("[data-cust]"), function (el) {
                el.addEventListener("click", function () {
                    openCustomer(el.getAttribute("data-cust"));
                });
            });
        }

        function openCustomer(id) {
            q("prof").classList.add("on");
            q("pTitle").textContent = "গ্রাহক";
            q("pBody").innerHTML = '<div class="loading">লোড হচ্ছে...</div>';
            window.scrollTo(0, 0);

            NK.GET("/api/customers/" + id + "/profile").then(function (p) {
                var c = p.customer || {};
                var h = "";

                h += '<div class="phead">';
                h += '<div class="pic">' + NK.esc((c.fullName || "?").charAt(0)) + '</div>';
                h += '<h2>' + NK.esc(c.fullName) + '</h2>';
                h += '<div class="sub">' + NK.esc(c.customerCode || "") + ' · ' +
                    NK.esc(c.phone || "") + '</div>';
                h += '<div class="rate" style="background:' +
                    NK.esc(p.ratingColor || "#5B6B75") + ';">' +
                    NK.esc(p.ratingLabel || p.rating || "") + '</div>';
                h += '</div>';

                if (p.canTakeNewLoan === false) {
                    h += '<div class="od-box">';
                    h += '<div class="t">⛔ নতুন লোন দেওয়া যাবে না</div>';
                    h += '<div class="a">' + NK.esc(p.blockReason || "") + '</div>';
                    h += '</div>';
                }

                h += '<div class="stats">';
                h += st("মোট লোন", (p.totalLoans || 0) + "টি");
                h += st("শোধ হয়েছে", (p.closedLoans || 0) + "টি", "g");
                h += st("চলছে", (p.activeLoans || 0) + "টি");
                h += st("এখনও বাকি", NK.inrShort(p.outstanding), "r");
                h += '</div>';
                if (Number(p.advanceAmount) > 0) {
                    h += '<div class="card" style="text-align:center;padding:12px;">';
                    h += '<div style="font-size:12.5px;color:var(--muted);">অগ্রিম জমা আছে</div>';
                    h += '<div style="font-size:20px;font-weight:800;color:var(--blue);">' + NK.inr(p.advanceAmount) + '</div>';
                    h += '</div>';
                }
                h += '<div class="card">';
                h += '<h2 style="margin-bottom:12px;">শোধের অভ্যাস</h2>';
                h += '<div class="stats" style="margin:0;">';
                h += st("মোট নিয়েছে", NK.inrShort(p.totalBorrowed));
                h += st("মোট শোধ", NK.inrShort(p.totalRepaid), "g");
                h += st("সময়ে দিয়েছে", (p.onTimeCount || 0) + " বার", "g");
                h += st("দেরি করেছে", (p.lateCount || 0) + " বার", p.lateCount ? "r" : "");
                h += '</div>';

                if (p.avgDaysToClose) {
                    h += '<div style="margin-top:12px;font-size:13px;color:var(--muted);">' +
                        'গড়ে <b>' + p.avgDaysToClose + ' দিনে</b> শোধ করেন</div>';
                }
                h += '</div>';

                h += '<h3 style="margin:16px 0 10px;">লোনের ইতিহাস</h3>';

                var loans = p.loans || [];

                if (!loans.length) {
                    h += '<div class="card"><div class="empty">কোনো লোন নেই</div></div>';
                } else {
                    h += '<div class="list">';
                    loans.forEach(function (l) {
                        h += '<div class="item">';
                        h += '<div class="av">' + NK.esc(l.cycle) + '</div>';
                        h += '<div class="mid"><b>' + NK.inr(l.principal) + '</b>' +
                            '<span>' + (l.startDate ? NK.dt(l.startDate) : "—") +
                            (l.closedOnDay ? ' · ' + l.closedOnDay + ' দিনে শোধ' : '') +
                            (l.agentName ? ' · ' + NK.esc(l.agentName) : '') + '</span></div>';
                        h += '<div class="end"><b>' + NK.inrShort(l.remaining) + '</b>' +
                            '<span class="b" style="background:' +
                            NK.esc(l.gradeColor || l.stageColor || "#5B6B75") +
                            ';color:#fff;">' +
                            NK.esc(l.gradeLabel || l.stageName || l.status || "") + '</span></div>';
                        h += '</div>';
                    });
                    h += '</div>';
                }

                /* ---- বাড়ি কোথায় (GPS) ---- */
                if (c.mapsUrl) {
                    h += '<a href="' + NK.esc(c.mapsUrl) + '" target="_blank" rel="noopener" ' +
                        'class="btn ghost block" style="margin:16px 0 0;text-decoration:none;">' +
                        '📍 বাড়ি দেখুন (Google Maps)</a>';
                }

                h += '<h3 style="margin:16px 0 10px;">তথ্য</h3>';
                h += '<div class="pinfo">';
                h += row("ফোন", c.phone);
                h += row("বাবা / স্বামী", c.fatherOrHusband);
                h += row("জন্মতারিখ", c.dateOfBirth ? NK.dt(c.dateOfBirth) : null);
                h += row("লিঙ্গ", GEN_BN[c.gender] || c.gender);
                h += row("ঠিকানা", c.address);
                h += row("ব্যবসার ঠিকানা", c.businessAddress);
                h += row("আধার", c.aadhaarMasked);
                h += row("প্যান", c.panMasked);
                h += row("জামিনদার", c.guarantorName);
                h += row("জামিনদারের ফোন", c.guarantorPhone);
                h += row("মার্কেট", c.marketName);
                h += '</div>';

                q("pBody").innerHTML = h;

            }).catch(function (e) {
                q("pBody").innerHTML = '<div class="card"><div class="empty">' +
                    NK.esc(e.message) + '</div></div>';
            });
        }
        function loadNotif() {
            NK.GET("/api/notifications").then(function (n) {
                var c = n.totalCount || 0;
                var d = q("dot");
                d.textContent = c > 99 ? "99+" : c;
                d.className = c > 0 ? "dot on" : "dot";
            }).catch(function () {});

            NK.GET("/api/loan-requests/pending/count").then(function (r) {
                var c = r.pending || 0;
                var d = q("rdot");
                if (c > 0) {
                    d.textContent = c;
                    d.style.cssText = "display:flex;position:absolute;top:6px;right:14px;" +
                        "min-width:16px;height:16px;background:var(--red);color:#fff;" +
                        "border-radius:8px;font-size:10px;align-items:center;" +
                        "justify-content:center;font-weight:700;";
                } else {
                    d.style.display = "none";
                }
            }).catch(function () {});
        }

        q("bell").addEventListener("click", function () {
            NK.GET("/api/notifications").then(function (n) {
                if (!n.items || !n.items.length) {
                    toast("নতুন কোনো খবর নেই", "in");
                    return;
                }
                n.items.forEach(function (it) {
                    toast(it.title + " — " + it.message,
                        it.severity === "URGENT" ? "er" : "in");
                });
            });
        });


        /* =====================================================================
         * শুরু
         * ===================================================================== */
        NK.boot().then(function (r) {

            if (!r.ok || !r.me) {
                q("gate").style.display = "flex";
                q("app").remove();
                return;
            }

            var u = r.me;

            if (u.mustChangePassword) {
                window.location.replace("change-password.html");
                return;
            }

            if (u.role !== "MANAGER") {
                window.location.replace(NK.homeFor(u.role));
                return;
            }

            q("gate").remove();
            q("app").style.display = "block";
            q("who").textContent = u.fullName + " · ম্যানেজার";

            /* অনুরোধের ট্যাবে জায়গা করি */
            var rt = document.querySelector('.tabs button[data-v="req"]');
            if (rt) rt.style.position = "relative";

            loadDash();
            loadNotif();
        });

    })();
</script>
<script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
            navigator.serviceWorker.register("/sw.js").catch(function () {});
        });
    }
</script>
</body>
</html>
